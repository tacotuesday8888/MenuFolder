name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build MenuFolder
        run: |
          xcodebuild \
            -project MenuFolder.xcodeproj \
            -scheme MenuFolder \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
